      one: "slice"
      few: "slices"
      many: "slices"
      other: "slices"
    łyżka:
      one: "spoon"
      few: "spoons"
      many: "spoons"
      other: "spoons"
    łyżeczka:
      one: "teaspoon"
      few: "teaspoons"
      many: "teaspoons"
      other: "teaspoons"
    g:
      one: "gram"
      few: "grams"
      many: "grams"
      other: "grams"
